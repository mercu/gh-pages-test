<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Pages Test</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 48px;
            max-width: 500px;
            text-align: center;
        }
        h1 { color: #58a6ff; margin-bottom: 16px; font-size: 28px; }
        p { line-height: 1.6; margin-bottom: 12px; }
        .time { color: #8b949e; font-size: 14px; margin-top: 24px; }
        .badge {
            display: inline-block;
            background: #238636;
            color: #fff;
            padding: 4px 12px;
            border-radius: 16px;
            font-size: 13px;
            margin-top: 16px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>GitHub Pages Test</h1>
        <p>GitHub Pages 배포 성공!</p>
        <p>이 페이지는 정적 HTML 파일로 서빙되고 있습니다.</p>
        <div class="badge">LIVE</div>
        <div class="time" id="time"></div>
    </div>
    <script>
        document.getElementById('time').textContent =
            'Loaded: ' + new Date().toLocaleString('ko-KR', { timeZone: 'Asia/Seoul' });
    </script>
</body>
</html>
